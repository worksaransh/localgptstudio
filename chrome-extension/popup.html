<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      background: #fff;
      color: #1a1a2e;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid #e5e7eb;
      background: linear-gradient(135deg, #f8f9ff, #fff);
    }
    .header h1 { font-size: 14px; font-weight: 600; flex: 1; }
    .status { width: 7px; height: 7px; border-radius: 50%; }
    .status.connected { background: #22c55e; }
    .status.disconnected { background: #ef4444; }
    .status.checking { background: #f59e0b; }

    .tabs { display: flex; border-bottom: 1px solid #e5e7eb; }
    .tab {
      flex: 1; padding: 8px; text-align: center; font-size: 12px;
      cursor: pointer; color: #6b7280; border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab.active { color: #6366f1; border-bottom-color: #6366f1; font-weight: 500; }
    .tab:hover { background: #f9fafb; }

    .panel { display: none; padding: 12px 14px; }
    .panel.active { display: block; }

    textarea, input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus, input[type="text"]:focus { border-color: #6366f1; }
    textarea { resize: vertical; min-height: 60px; }

    button {
      padding: 7px 14px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      background: #6366f1;
      color: #fff;
    }
    button:hover { background: #4f46e5; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: #f3f4f6; color: #374151; }
    button.secondary:hover { background: #e5e7eb; }

    .btn-group { display: flex; gap: 6px; margin-top: 8px; }
    .btn-group button { flex: 1; }

    .response-box {
      margin-top: 10px;
      padding: 10px;
      background: #f9fafb;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .response-box.loading { color: #9ca3af; }

    .settings-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .settings-row label { font-size: 12px; color: #374151; min-width: 80px; }
    .settings-row input { flex: 1; }

    .saved-msg { font-size: 11px; color: #22c55e; text-align: center; margin-top: 4px; }

    .footer-text {
      font-size: 10px;
      color: #9ca3af;
      text-align: center;
      padding: 8px;
      border-top: 1px solid #f3f4f6;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2">
      <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
    </svg>
    <h1>LocalGPT Studio</h1>
    <div class="status checking" id="statusDot"></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="chat">Quick Chat</div>
    <div class="tab" data-tab="page">Page</div>
    <div class="tab" data-tab="settings">Settings</div>
  </div>

  <!-- Quick Chat -->
  <div class="panel active" id="panel-chat">
    <textarea id="chatInput" placeholder="Ask LocalGPT anything..." rows="3"></textarea>
    <div class="btn-group">
      <button id="chatSend">Send</button>
    </div>
    <div class="response-box" id="chatResponse" style="display:none"></div>
  </div>

  <!-- Page -->
  <div class="panel" id="panel-page">
    <p style="font-size:12px;color:#6b7280;margin-bottom:8px">Current page actions:</p>
    <div class="btn-group">
      <button id="summarizeBtn">Summarize</button>
      <button id="saveMemoryBtn">Save to Memory</button>
    </div>
    <div style="margin-top:8px">
      <textarea id="pageQuestion" placeholder="Ask a specific question about this page..." rows="2"></textarea>
      <div class="btn-group">
        <button id="askPageBtn">Ask</button>
      </div>
    </div>
    <div class="response-box" id="pageResponse" style="display:none"></div>
  </div>

  <!-- Settings -->
  <div class="panel" id="panel-settings">
    <div class="settings-row">
      <label>Server URL</label>
      <input type="text" id="serverUrl" value="http://localhost:8000" />
    </div>
    <div style="margin-top:8px">
      <label style="font-size:12px;color:#374151;">Default Workspace</label>
      <select id="workspaceSelect" style="width:100%;margin-top:4px;padding:6px 8px;border:1px solid #d1d5db;border-radius:8px;font-size:12px;">
        <option value="">Loading...</option>
      </select>
    </div>
    <button id="saveSettings" style="width:100%;margin-top:10px">Save</button>
    <div class="saved-msg" id="savedMsg"></div>
  </div>

  <div class="footer-text">
    All data processed locally via LM Studio
  </div>

  <script src="popup.js"></script>
</body>
</html>
